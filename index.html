<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
<div class="header">
    <nav class="navbar navbar-expand-sm fixed-top custom-nav">
    <div class="container-fluid">
     <h3 class="logo">
      <i class="fa fa-heart"></i> Medicare Plus
    </h3>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Services</a></li>
      <li class="nav-item"><a class="nav-link" href="#">About</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Team</a></li>
      <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
    </ul>
    <button class="book-btn">Book Appointment</button>
  </div>
  </nav>
</div>
<div id="home" class="main">
    <h1>Schedule Your Appointment</h1>
    <p>Book your appointment online or call us directly.We're here to provide <br> you with the best healthcare experience.</p>
</div>
<div class="container">
    <div class="form-wrapper">
    <form class="log-form" action="#" method="post" id="contact">
        <div class="row">
            <div class="col-md-6">                    
                <input type="text" name="fname" placeholder="First Name" required>
            </div>
            <div class="col-md-6">
               <input type="text" name="lname" placeholder="Last Name" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">               
                <input type="email" name="email" placeholder="Email Address">
            </div>                
            <div class="col-md-6">
                <input type="tel" name="phone" placeholder="Phone Number">
            </div>
        </div>
        <div class="row">
            <div  class="col-md-6">               
                <input type="text" name="select" placeholder="Select Service">
            </div>
            <div class="col-md-6">
                <input type="date" name="date" placeholder="mm/dd/yyyy">
            </div>
        </div>
        <div class="row">
            <div class="col-12">               
                <textarea name="info" id="info" rows="4" placeholder="Additional Information(Optional)"></textarea>
            </div>
        </div>
        <div class="submit-btn">
            <button type="submit" class="btn">Book Appointment <i class="fa fa-calendar p-2"></i></button>
        </div>
    </form>
    </div>
</div>
</body>
</html>
